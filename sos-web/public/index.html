<!DOCTYPE html>
<html>
<head>
    <title>Guardian360 Live Tracking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        #header {
            background-color: #f84b4b;
            color: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1000;
            transition: background-color 0.6s ease;
        }
        #header.safe { background-color: #388e3c; }
        #header h2 { margin: 0; font-size: 20px; }
        #header p { margin: 5px 0 0 0; font-size: 14px; opacity: 0.9; }

        #map {
            height: calc(100% - 75px);
            width: 100%;
            background-color: #ddd;
        }

        .status-badge {
            background-color: #fff;
            color: #d32f2f;
            padding: 3px 10px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 12px;
            margin-top: 5px;
            display: inline-block;
            transition: color 0.4s;
        }

        /* Safe overlay shown when person marks themselves safe */
        #safeOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(56, 142, 60, 0.95);
            color: white;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
        }
        #safeOverlay.show { display: flex; }
        #safeOverlay h1 { font-size: 48px; margin-bottom: 10px; }
        #safeOverlay p { font-size: 22px; opacity: 0.9; }
    </style>
</head>
<body>

    <!-- Safe Banner (hidden until is_safe = true in Firestore) -->
    <div id="safeOverlay">
        <h1>✅</h1>
        <h1>She is Safe!</h1>
        <p>The emergency person has confirmed they are safe.<br>Live location tracking has been stopped.</p>
    </div>

    <div id="header">
        <h2>🚨 Guardian360 Live Emergency Tracker</h2>
        <div class="status-badge" id="statusBadge">Connecting...</div>
        <p id="idText">Session ID: --</p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4e33HHhBbWOkeFsPjaRBrMLkCy1Nuu7A",
            authDomain: "p-key-sadw8b5ihftl.firebaseapp.com",
            projectId: "p-key-sadw8b5ihftl",
            storageBucket: "p-key-sadw8b5ihftl.firebasestorage.app",
            messagingSenderId: "1023817398127"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get("id");

        const statusBadge = document.getElementById("statusBadge");
        const header = document.getElementById("header");
        const safeOverlay = document.getElementById("safeOverlay");

        if (sessionId) {
            document.getElementById("idText").innerText = "Session ID: " + sessionId;

            var map = L.map('map').setView([0, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            var marker = null;
            var circle = null;

            // --- Listen for "I AM SAFE" status on the alert document ---
            const alertDocRef = doc(db, "active_alerts", sessionId);
            onSnapshot(alertDocRef, (docSnap) => {
                if (!docSnap.exists()) return;
                const data = docSnap.data();
                if (data.is_safe === true) {
                    // Show the full-screen "She is Safe!" overlay!
                    safeOverlay.classList.add("show");
                    header.classList.add("safe");
                    statusBadge.innerText = "✅ SAFE";
                    statusBadge.style.color = "#388e3c";
                }
            });

            // --- Listen for live location updates ---
            const locationsRef = collection(db, "active_alerts", sessionId, "locations");
            const q = query(locationsRef, orderBy("timestamp", "asc"));

            onSnapshot(q, (snapshot) => {
                if (snapshot.empty && !marker) {
                    statusBadge.innerText = "Waiting for GPS data...";
                    statusBadge.style.color = "#f57c00";
                }

                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added" || change.type === "modified") {
                        const data = change.doc.data();
                        const latLng = [data.lat, data.lng];
                        const accuracy = data.accuracy || 20;

                        statusBadge.innerText = "LIVE 🟢";
                        statusBadge.style.color = "#388e3c";

                        if (!marker) {
                            marker = L.marker(latLng).addTo(map);
                            circle = L.circle(latLng, {radius: accuracy, color: '#f84b4b', fillColor: '#f84b4b', fillOpacity: 0.2}).addTo(map);
                            marker.bindPopup("<b>Emergency Location</b><br>Live Tracking Active").openPopup();
                            map.setView(latLng, 16);
                        } else {
                            marker.setLatLng(latLng);
                            if (circle) circle.setLatLng(latLng).setRadius(accuracy);
                            map.panTo(latLng);
                        }
                    }
                });
            }, (error) => {
                console.error("Firestore error:", error);
                statusBadge.innerText = "Error: Permission Denied";
            });

        } else {
            statusBadge.innerText = "Invalid Tracking Link";
            document.getElementById("idText").innerText = "No ID provided in URL";
        }
    </script>
</body>
</html>
